experiment_name: "ch-sims-v2_no_style_baseline"
model:
  text_dim: 768
  audio_dim: 25
  visual_dim: 177
  hidden_dim: 768   
  style_dim: 256
  num_classes: 2
  dropout_prob: 0.10078973062692759
  lambda_style: 0.0
  contrastive_margin: 1.0
  # Router MLP
  router_hidden_dim: 384 # Router MLP单层宽度
  router_dropout: 0.08239898622944626
  router_depth: 2         # Router MLP层数（2层足够）

  cls_hidden_dim: 128
  cls_dropout: 0.5937646156300298
  reg_hidden_dim: 128
  reg_dropout: 0.5931714916275074

  
        
training:
  lr: 5.225287417612049e-05
  weight_decay: 0.007970284146142002
  batch_size: 32
  epochs: 50
  early_stopping_patience: 10
  loss_reg: 2.4682076998846125
  loss_alpha: 2.388164541731171
  loss_beta: 0.7010751372832902
  loss_weight_has0_cls: 1.5184915606738547
  focal_alpha_binary: balanced
  focal_gamma: 2.867542812126472
  focal_gamma_has0: 2.7693411543405433
  focal_alpha: [0.5, 0.5]  # 类别权重，进一步提升中性表现
  focal_alpha_has0 : [0.5, 0.5]
  # 新增：辅助损失权重 (示例值)
  aux_loss_weights:
    text_reg: 0.2928704747961461
    text_cls: 0.306016436187712
    audio_reg: 0.1917417353649882
    audio_cls: 0.02198207558991777
    vision_reg: 0.028844892007599238
    vision_cls: 0.010104402587950256

  score_weight_f1_non0: 0.4
  score_weight_f1_has0: 0.1
  score_weight_corr: 0.3
  score_weight_mae: 0.2 # 

dataset_specifics:
  # MOSEI (或 MOSI)
  positive_threshold_binary_non_neutral: 0.00001 # 用于排除中性的二分类，> 这个值为正
  negative_threshold_binary_non_neutral: -0.00001 # 用于排除中性的二分类，< 这个值为负
  positive_threshold_binary_has0: 0.0           # 用于包含中性的二分类 (正 vs 非正)，> 这个值为正 (通常是0)
  acc7_clip_range: [-3.0, 3.0]
  acc5_clip_range: [-2.0, 2.0]

paths:
  data_dir: "D:/Study/style_moe/database/ch-sims-v2"
  output_dir: "D:/Study/style_moe/outputs/ch-sims-v2"
  cluster_path: "D:/Study/style_moe/clusters/centers_256dim_sims-v2.npy"